# vim:fileencoding=utf-8:foldmethod=marker

# https://sw.kovidgoyal.net/kitty/conf/

# To get a full list of supported fonts use the `kitty +list-fonts` command.
# Lilex https://lilex.myrt.co/  https://github.com/mishamyrt/Lilex

# BEGIN_KITTY_FONTS
#font_family      family="Menlo"
font_family      monospace
# 设置字体家族为 Fantasque Sans Mono
# font_family  Fantasque Sans Mono
# 设置字体大小为 16 磅
font_size        16.0
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

copy_on_select                            yes
# The cursor color
cursor           #8fee96

# The cursor shape can be one of (block, beam, underline)
shell_integration no-cursor
cursor_shape block

# The interval (in seconds) at which to blink the cursor. Set to zero to
# disable blinking.
cursor_blink_interval     0.5

# Stop blinking cursor after the specified number of seconds of keyboard inactivity. Set to
# zero or a negative number to never stop blinking.
cursor_stop_blinking_after 15.0

# 设置滚动缓冲区行数为 8000 行，可以向上滚动的最大行数
scrollback_lines 8000

# Wheel scroll multiplier (modify the amount scrolled by the mouse wheel)
wheel_scroll_multiplier 5.0
wheel_scroll_min_lines 1
touch_scroll_multiplier 1.0
pixel_scroll yes
momentum_scroll 0.96

# 在命令提示符处粘贴 URL 时自动添加引号
paste_actions quote-urls-at-prompt

# 从复制的内容中去除尾随空格，设置为 never 表示不去除
strip_trailing_spaces never

# 定义双击选择单词时包含的字符集
select_by_word_characters @-./_~?&=%+#

# 在鼠标悬停时显示超链接的目标地址
show_hyperlink_targets yes

# 取消左键单击打开链接的功能（防止误点击）
mouse_map left click ungrabbed no-op

#: Ctrl+左键单击时点击链接或移动光标
mouse_map ctrl+left click ungrabbed mouse_handle_click selection link prompt

# Ctrl+左键按下时开始选择文本
mouse_map ctrl+left press ungrabbed mouse_selection normal

# 右键按下时将选中内容复制到剪贴板
mouse_map right press ungrabbed copy_to_clipboard

# 记住窗口大小，下次启动时使用上次的大小
remember_window_size  yes
# 初始窗口宽度 640 像素（如果 remember_window_size 为 no 时生效）
initial_window_width  640
# 初始窗口高度 400 像素
initial_window_height 400

#: If enabled, the window size will be remembered so that new
#: instances of kitty will have the same size as the previous
#: instance. If disabled, the window will initially have size
#: configured by initial_window_width/height, in pixels. You can use a
#: suffix of "c" on the width/height values to have them interpreted
#: as number of cells instead of pixels.

# fat -- One (or optionally more) windows are shown full width on the top, the rest of the windows are shown side-by-side on the bottom
# grid -- All windows are shown in a grid
# horizontal -- All windows are shown side-by-side
# splits -- Windows arranged in arbitrary patterns created using horizontal and vertical splits
# stack -- Only a single maximized window is shown at a time
# tall -- One (or optionally more) windows are shown full height on the left, the rest of the windows are shown one below the other on the right
# vertical -- All windows are shown one below the other

enabled_layouts splits,stack
#enabled_layouts all

# Send a notification when a command takes more than 30 seconds in a invisible window
#notify_on_cmd_finish invisible 30.0

# https://sw.kovidgoyal.net/kitty/layouts/#the-splits-layout
include splits.conf

#: The enabled window layouts. A comma separated list of layout names.
#: The special value all means all layouts. The first listed layout
#: will be used as the startup layout. Default configuration is all
#: layouts in alphabetical order. For a list of available layouts, see
#: the https://sw.kovidgoyal.net/kitty/overview/#layouts.

# 使用键盘调整窗口大小时的步长（水平方向，单位为单元格宽度）
window_resize_step_cells 2
# 使用键盘调整窗口大小时的步长（垂直方向，单位为行高）
window_resize_step_lines 2

# 窗口边框宽度为 0.5 磅
window_border_width 0.5pt

window_margin_width 15

# 可视窗口选择时使用的字符集（0-9 和 A-Z）
visual_window_select_characters 1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZ

#: 用于可视窗口选择的字符列表（例如用于通过 focus_visible_window 选择要聚焦的窗口）
#: 值应为一系列唯一的数字或字母，不区分大小写，取自 [0-9A-Z] 集合

# 使用 Shell 集成时，负值表示不计入停留在 shell 提示符的窗口，
# 只计入有命令正在运行的窗口
# 关闭 OS 窗口时确认，-1 表示只有在有命令正在运行时才确认
confirm_os_window_close -1

# Tab 栏位置：top 或 bottom
tab_bar_edge bottom
# 标签栏左右两侧的边距（以点数计）
tab_bar_margin_width 0.0
# 标签栏上下的边距（以点数计）。第一个数字是作系统窗口边缘与标签栏之间的边界。第二个数字是标签栏与当前标签页内容之间的边距
tab_bar_margin_height 0.0 0.0
# 标签栏样式为 fade,slant,separator,powerline,hidden
tab_bar_style fade

# 标签 powerline round样式为圆角
tab_powerline_style slanted

# 至少有一个 tab 时就显示 tab 栏
tab_bar_min_tabs 1
# 标签栏背景色
tab_bar_background #0a0a0a
# 活动标签的前景色
active_tab_foreground #c0b18b
# 活动标签的背景色
active_tab_background #252525
# 非活动标签的前景色
inactive_tab_foreground #807860
# 非活动标签的背景色
inactive_tab_background #1a1a1a

# Tab-bar colors
#active_tab_foreground #000
#active_tab_background #eee
#inactive_tab_foreground #444
#inactive_tab_background #999

# The color for the border of the active window
active_border_color #ffffff

# The color for the border of inactive windows
inactive_border_color #cccccc

# The program with which to open URLs that are clicked on. The special value "default" means to
# use the operating system's default URL handler.
open_url_with default

# 标签标题模板，包含铃铛符号、活动符号、索引等
# 当布局为 stack 且有多个窗口时，显示 🇿 emoji
tab_title_template "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{index}:{'🇿' if layout_name == 'stack' and num_windows > 1 else ''}{title}"

#: 前景色和背景色

# 前景色（文本颜色）
foreground       #c0b18b

# 背景色
background       #151515

# The foreground for selections
#selection_foreground #2f2f2f

# The background for selections
#selection_background #d75f5f

# 背景透明度，1.0 表示完全不透明
background_opacity 1.0

# 背景图片路径，none 表示无背景图片
background_image none

#: 背景图片路径，必须为 PNG 格式

# 背景图片布局方式，tiled 表示平铺
background_image_layout tiled

#: 背景图片的平铺方式，可以是 tiled（平铺）、mirror-tiled（镜像平铺）、scaled（缩放）、clamped（拉伸）

# 背景图片缩放时不使用线性插值
background_image_linear no

#: 背景图片缩放时是否使用线性插值

# 允许动态更改背景透明度
dynamic_background_opacity yes

#: 允许使用键盘快捷键或远程控制动态更改背景透明度
#: 重新加载配置不会更改此设置

# 允许远程控制 kitty
allow_remote_control yes

#: 允许其他程序控制 kitty。开启后其他程序可以控制 kitty 的所有方面，
#: 包括向窗口发送文本、打开/关闭窗口、读取窗口内容等。
#: 甚至可以通过 ssh 连接工作。可以选择 yes（允许任何程序）或
#: socket-only（仅允许通过 kitty --listen-on 指定的 socket 连接的程序）

# UNIX socket 监听地址（已注释）
#listen_on unix:$XDG_RUNTIME_DIR/kitty.sock
# TCP socket 监听地址（已注释）
#listen_on tcp:localhost:12488

#: 告诉 kitty 监听指定的 unix/tcp socket 以进行远程控制连接
#: 此设置适用于所有 kitty 实例。可以被 kitty --listen-on 命令行标志覆盖
#: 仅接受 UNIX sockets，如 unix:${TEMP}/mykitty 或（在 Linux 上）unix:@mykitty
#: 除非同时设置 allow_remote_control 启用远程控制，否则此选项被忽略

# 启动时加载的会话配置文件
startup_session default.kitty-session

# 允许处理超链接（OSC 8）转义序列
allow_hyperlinks yes

#: 处理超链接（OSC 8）转义序列。禁用时忽略 OSC 8 序列。
#: 否则它们将成为可点击的链接，可以通过鼠标或 hints kitten 点击
#: 特殊值 ``ask`` 表示点击链接前询问

# 启用 shell 集成
shell_integration enabled

#: 在支持的 shell 上启用 shell 集成。这启用了诸如跳转到上一个提示符、
#: 在分页器中浏览上一个命令的输出等功能。设置为 ``disabled`` 完全关闭。
#: 详见 https://sw.kovidgoyal.net/kitty/shell-integration/

# 使用 kitty 的默认终端类型以获得更好的键盘协议支持
# 设置 term 为 xterm-256color 会导致应用使用 xterm 的 modifyOtherKeys
# 这已被 kitty 的键盘协议取代
term xterm-kitty

# 设置修饰键为 Cmd+Shift，用于快捷键组合
kitty_mod cmd+shift

# kitty_mod 必须是修饰键而不是普通键

# 禁用 Cmd+Shift+Enter 创建新窗口（防止在粘贴后误按 Enter 创建窗口）
map kitty_mod+enter no-op

# Cmd+w 关闭当前窗口
map cmd+w close_window

# Cmd+] 切换到下一个窗口
map cmd+] next_window

# Cmd+[ 切换到上一个窗口
map cmd+[ previous_window

# Cmd+. 将窗口向前移动
map cmd+period move_window_forward

# Cmd+, 将窗口向后移动
map cmd+comma move_window_backward

map ctrl+shift+f2 edit_config_file
#map cmd+, edit_config_file 🍎

# Cmd+shift+t 水平分割窗口
map kitty_mod+t launch --location=hsplit
# Cmd+t 在当前目录创建新标签页
# 需要 shell_integration enabled
map cmd+t launch --cwd=last_reported --type=tab

# Cmd+shift+, 设置标签标题
map cmd+shift+, set_tab_title

#: 增加字体大小

# Cmd+= 增加字体大小 2 磅
map cmd+equal  change_font_size all +2.0
# Cmd++ 增加字体大小 2 磅
map cmd+plus   change_font_size all +2.0
# Cmd+小键盘+ 增加字体大小 2 磅
map cmd+kp_add change_font_size all +2.0

#: 减小字体大小

# Cmd+- 减小字体大小 2 磅
map cmd+minus       change_font_size all -2.0
# Cmd+小键盘- 减小字体大小 2 磅
map cmd+kp_subtract change_font_size all -2.0

#: 重置字体大小

# Cmd+0 重置字体大小为默认值
map cmd+0 change_font_size all 0

# Cmd+Enter 切换全屏模式
map cmd+enter toggle_fullscreen

# Cmd+,E 在新标签页中使用 nvim 编辑配置文件
map cmd+e launch --type=tab nvim ~/.config/kitty/kitty.conf

#: 重新加载 kitty.conf 并显示提示

# Cmd+Shift+R 重新加载配置并显示提示
map cmd+shift+r combine : load_config_file : launch --type=overlay sh -c 'echo "kitty config reloaded."; echo; read -r -p "Press Enter to exit"; echo ""'

#: 调试 kitty 配置

# Cmd+Shift+D 调试配置
map cmd+shift+d     debug_config

# BEGIN_KITTY_THEME
# 包含当前主题配置文件
#include current-theme.conf
# END_KITTY_THEME

# 使用自定义字母表的 hints kitten（用于快速选择文本/链接等）
# 从 tmux-thumbs 项目借用适合 QWERTY 键盘的字母表
map cmd+space kitten hints --alphabet asdfqwerzxcvjklmiuopghtybn1234567890 --customize-processing custom-hints.py

# Cmd+Shift+H 显示所有程序的 hints
map cmd+shift+h kitten hints --program '*'

# 将 Ctrl+Ctrl 映射为发送 Ctrl+a（home 键）
map ctrl+alt+a send_text all \x01

# 发送换行符字面量，用于 claude-code
# 解决方案：https://github.com/anthropics/claude-code/issues/3853
map shift+enter send_text all \n

# Cmd+O 打开文件选择器
map cmd+o kitten choose-files

# Cmd+Shift+O 打开目录选择器
map cmd+shift+o kitten choose-files --mode=dir

# 包含用户特定的本地配置文件
# 会在主配置之后加载，允许用户覆盖主配置
#include ${USER}.local.conf

map shift+cmd+/ open_url https://sw.kovidgoyal.net/kitty/ 🍎
#macos_titlebar_color system,dark
macos_titlebar_color #252525
macos_quit_when_last_window_closed no
macos_window_resizable yes









env HTTPS_PROXY=http://127.0.0.1:7897 
env NO_PROXY=localhost,127.0.0.1:4096,*.17usoft.com,*.ly.com,*.elong.com,*.17u.com
env VAR2=${HTTPS_PROXY}/${NO_PROXY}/b